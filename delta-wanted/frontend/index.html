<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赛博通缉令 - 三角洲行动</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="/" class="logo">
        <span class="logo-icon">&#128083;</span>
        <span class="logo-text">赛博通缉令</span>
        <span class="logo-sub">三角洲行动</span>
      </a>
      <nav class="topbar-nav">
        <a href="#" class="nav-link active" data-page="bounties">通缉大厅</a>
        <a href="#" class="nav-link" data-page="messages" id="nav-msg">
          私信
          <span class="unread-badge" id="unread-badge" style="display:none">0</span>
        </a>
        <a href="#" class="nav-link" data-page="admin" id="nav-admin" style="display:none">管理</a>
      </nav>
      <div class="topbar-right">
        <span id="user-status">未登录</span>
        <button id="btn-login" class="btn btn-outline">登录</button>
        <button id="btn-user" class="btn btn-primary" style="display:none">我</button>
      </div>
    </div>
  </header>

  <main>
    <!-- Bounties Page -->
    <section id="page-bounties" class="page active">
      <div class="hero-banner">
        <h1>&#128083; 赛 博 通 缉 令</h1>
        <p>三角洲行动 | 挂逼追踪 | 恶意行为曝光 | 赏金猎人排行榜</p>
      </div>

      <div class="container">
        <div class="toolbar">
          <div class="filter-tabs">
            <button class="filter-tab active" data-status="active">&#128206; 活跃通缉</button>
            <button class="filter-tab" data-status="hunting">&#127919; 狩猎中</button>
            <button class="filter-tab" data-status="completed">&#9989; 已完成</button>
            <button class="filter-tab" data-status="all">&#128203; 全部</button>
          </div>
          <button id="btn-new-bounty" class="btn btn-danger">&#9876; 发布通缉令</button>
        </div>

        <div id="bounty-list" class="bounty-grid"></div>
        <div id="bounty-pagination" class="pagination"></div>
      </div>
    </section>

    <!-- Messages Page -->
    <section id="page-messages" class="page">
      <div class="container">
        <h2 class="page-title">&#128172; 私信</h2>
        <div class="msg-layout">
          <div class="msg-list" id="conv-list"></div>
          <div class="msg-chat" id="chat-area">
            <div class="chat-empty">选择对话开始聊天</div>
          </div>
        </div>
      </div>
    </section>

    <!-- Profile Page -->
    <section id="page-profile" class="page">
      <div class="container">
        <div class="profile-card">
          <div class="profile-header">
            <div class="profile-avatar" id="prof-avatar"></div>
            <div class="profile-info">
              <h2 id="prof-name"></h2>
              <p id="prof-join"></p>
            </div>
          </div>
          <div class="profile-stats" id="prof-stats"></div>
        </div>
      </div>
    </section>

    <!-- Admin Page -->
    <section id="page-admin" class="page">
      <div class="container">
        <h2 class="page-title">&#128736; 用户管理</h2>
        <div id="admin-user-list" class="admin-user-list"></div>
      </div>
    </section>
  </main>

  <!-- Login/Register Modal -->
  <div class="modal-overlay" id="modal-auth">
    <div class="modal">
      <div class="modal-header">
        <h2 id="auth-title">登录</h2>
        <button class="modal-close">&times;</button>
      </div>
      <form id="auth-form">
        <input type="text" id="auth-username" placeholder="用户名" required autocomplete="off">
        <input type="password" id="auth-password" placeholder="密码" required autocomplete="off">
        <p id="auth-error" class="form-error"></p>
        <button type="submit" class="btn btn-primary btn-block" id="auth-submit">登录</button>
      </form>
      <p class="form-switch">
        <span id="auth-switch-text">还没有账号？</span>
        <a href="#" id="auth-switch-link">注册</a>
      </p>
    </div>
  </div>

  <!-- New Bounty Modal -->
  <div class="modal-overlay" id="modal-bounty">
    <div class="modal">
      <div class="modal-header">
        <h2>&#9876; 发布通缉令</h2>
        <button class="modal-close">&times;</button>
      </div>
      <form id="bounty-form">
        <label>游戏内 ID</label>
        <input type="text" id="bounty-gameid" placeholder="被通缉者的游戏ID" required>
        <label>通缉理由</label>
        <textarea id="bounty-reason" rows="4" placeholder="描述此人的恶意行为（暗号骗出来杀、开挂、恶意TK等）" required></textarea>
        <label>悬赏金额（可选）</label>
        <input type="text" id="bounty-reward" placeholder="例如：50万哈夫币 或 一件紫装">
        <p id="bounty-error" class="form-error"></p>
        <button type="submit" class="btn btn-danger btn-block">发布通缉令</button>
      </form>
    </div>
  </div>

  <!-- Bounty Detail Modal -->
  <div class="modal-overlay" id="modal-detail">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h2 id="detail-title"></h2>
        <button class="modal-close">&times;</button>
      </div>
      <div id="detail-body"></div>
    </div>
  </div>

  <!-- New Message Modal -->
  <div class="modal-overlay" id="modal-new-msg">
    <div class="modal">
      <div class="modal-header">
        <h2>&#128172; 新私信</h2>
        <button class="modal-close">&times;</button>
      </div>
      <input type="text" id="msg-search-user" placeholder="搜索用户名..." autocomplete="off">
      <div id="user-search-results" class="user-search-list"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
